spring.application.name=swim-club-backend

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${SERVER_PORT:8089}

# Logging
logging.level.root=INFO
logging.level.com.swimclub=DEBUG

# JWT Configuration
jwt.secret=your_jwt_secret_key_make_it_long_and_secure_at_least_64_characters
jwt.expiration=86400000

# Jackson date configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# CORS Configuration
cors.allowed-origins=http://localhost:4200,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*

# ===============================
# Spring AI / Ollama & MongoDB Configuration
# ===============================
spring.ai.ollama.base-url=http://ollama:11434
spring.ai.ollama.chat.model=qwen2.5:1.5b

spring.data.mongodb.uri=mongodb://mongodb:27017/ftn_natation

