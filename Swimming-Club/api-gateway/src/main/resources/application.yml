server:
  port: 8080 # 🌟 Correction : Aligné avec le port interne du docker-compose

spring:
  application:
    name: api-gateway

  # ── OAuth2 Resource Server (JWT validation via Keycloak interne) ──
  security:
    oauth2:
      resourceserver:
        jwt:
          #issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://keycloak:8080/realms/swimming-platform}
          jwk-set-uri: http://aquapro-keycloak:8080/realms/swimming-platform/protocol/openid-connect/certs

  # ── Gateway Routes (Routage Inter-Conteneurs) ───────────────────────────
  cloud:
    gateway:
      routes:
        # 1. 🐍 Route vers le Scraper API -> Python FastAPI (Haute Priorité)
        - id: scraper-api-service
          uri: ${SCRAPER_SERVICE_URL:http://scraper-api:8000}
          predicates:
            - Path=/api/scrape/**, /api/data/**
          filters:
            - PreserveHostHeader

        # 2. 🤖 Route pour le Chatbot IA (RAG) -> Backend Java
        - id: ai-chatbot-service
          uri: ${AI_SERVICE_URL:http://backend:8089}
          predicates:
            - Path=/api/ai/**
          filters:
            - PreserveHostHeader

        # 3. 🏊 Route Métier Globale -> Backend Java (Englobe Auth, Pools, Competitions, etc.)
        # Placé tout en bas pour servir de "Catch-All" sans bloquer FastAPI
        - id: swim-club-backend
          uri: http://backend:8089
          predicates:
            - Path=/api/**
          filters:
            - PreserveHostHeader

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      # CORS configuration (Autorise ton Angular)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost"
              - "http://localhost:4200"
              - "http://127.0.0.1"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

# ── Actuator ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true

# ── Logging ──────────────────────────────────────
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG