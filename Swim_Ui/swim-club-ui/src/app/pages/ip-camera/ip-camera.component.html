<!-- Premium Live Swimming Broadcast UI -->
<div class="w-full relative rounded-[2rem] overflow-hidden shadow-2xl bg-black border border-slate-800/80 group" style="min-height: 600px;">
  
  <!-- Ambient background glow (visible when offline) -->
  <div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/40 via-slate-900 to-black animate-pulse"></div>

  <!-- Stream Video / Idle Container -->
  <div class="absolute inset-0 z-10 flex items-center justify-center">
    
    <!-- Idle state -->
    <div *ngIf="!isConnected && !isLoading" class="text-center relative z-20 transition-all duration-500 transform group-hover:scale-105">
      <div class="relative w-32 h-32 mx-auto mb-8">
        <div class="absolute inset-0 bg-blue-500/20 rounded-full blur-xl animate-pulse"></div>
        <div class="w-32 h-32 rounded-full border border-slate-700/50 bg-slate-800/80 backdrop-blur-xl flex items-center justify-center shadow-[0_0_40px_rgba(0,0,0,0.5)]">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          </svg>
        </div>
      </div>
      <h3 class="text-white text-2xl font-bold tracking-[0.2em] uppercase mb-2">Signal Interrompu</h3>
      <p class="text-slate-500 text-sm font-medium tracking-widest uppercase">En attente de connexion de la caméra</p>
    </div>

    <!-- Error -->
    <div *ngIf="connectionError" class="text-center relative z-20">
      <div class="w-24 h-24 mx-auto bg-red-500/10 rounded-full flex items-center justify-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <h3 class="text-red-400 text-xl font-bold tracking-[0.2em] uppercase mb-6">Erreur de Flux</h3>
      <button (click)="connect()" class="px-8 py-3 rounded-full bg-red-600/20 hover:bg-red-600/40 text-red-100 transition-all border border-red-500/30 text-xs font-bold uppercase tracking-[0.2em] hover:shadow-[0_0_20px_rgba(220,38,38,0.3)]">
        Réessayer
      </button>
    </div>

    <!-- Loading -->
    <div *ngIf="isConnected && isLoading && !connectionError" class="text-center relative z-20">
      <div class="relative w-20 h-20 mx-auto mb-6">
        <div class="absolute inset-0 border-4 border-slate-700 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
      </div>
      <p class="text-blue-400 font-bold tracking-[0.2em] text-xs uppercase animate-pulse">Initialisation du Direct...</p>
    </div>

    <!-- MJPEG Stream -->
    <img *ngIf="isConnected && streamType === 'mjpeg' && safeUrl" #streamImg [src]="safeUrl" (load)="onStreamLoaded()" (error)="onStreamError()" class="w-full h-full object-cover transition-opacity duration-1000" [class.opacity-0]="isLoading" [class.opacity-100]="!isLoading" />
  </div>



  <!-- Connection Control Bar (Hidden when connected, appears on hover of the container) -->
  <div class="absolute inset-x-0 bottom-0 pt-32 pb-6 px-6 bg-gradient-to-t from-black via-black/80 to-transparent z-30 flex items-end justify-center transition-all duration-500 ease-in-out opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 focus-within:opacity-100 focus-within:translate-y-0" [class.!opacity-100]="!isConnected" [class.!translate-y-0]="!isConnected">
    
    <div class="w-full max-w-2xl bg-black/50 backdrop-blur-2xl p-2 rounded-2xl border border-white/10 shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex items-center gap-2">
      <div class="pl-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
        </svg>
      </div>
      <input [(ngModel)]="inputUrl" type="text" [placeholder]="layoutSvc.t('ipcam_url_placeholder') || 'Entrez le lien du flux vidéo (ex: http://192.168.1.10:8080/video)'" class="flex-1 bg-transparent text-white px-2 py-3 text-sm focus:outline-none placeholder:text-slate-500 font-mono tracking-wide" (keydown.enter)="connect()" />
      
      <button *ngIf="!isConnected" (click)="connect()" [disabled]="!inputUrl.trim()" class="px-8 py-3 rounded-xl bg-blue-600 text-white font-bold text-sm tracking-wider uppercase hover:bg-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_15px_rgba(37,99,235,0.4)]">
        Connecter
      </button>
      <button *ngIf="isConnected" (click)="disconnect()" class="px-8 py-3 rounded-xl bg-red-600/80 text-white font-bold text-sm tracking-wider uppercase hover:bg-red-500 transition-colors border border-red-500/50">
        Déconnecter
      </button>

      <!-- Fullscreen Toggle -->
      <button (click)="toggleFullscreen()" class="p-3 ml-1 rounded-xl bg-white/5 text-white hover:bg-white/10 transition-colors border border-white/5" [title]="layoutSvc.t('ipcam_fullscreen') || 'Plein écran'">
        <svg *ngIf="!isFullscreen" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
        </svg>
        <svg *ngIf="isFullscreen" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4m0 0H4m5 0L3 10m18-1v5m0 0h-5m5 0l-6-6M9 20v-5m0 0H4m5 0l-6 6m18-1v-5m0 0h-5m5 0l-6-6"/>
        </svg>
      </button>
    </div>
  </div>

</div>
