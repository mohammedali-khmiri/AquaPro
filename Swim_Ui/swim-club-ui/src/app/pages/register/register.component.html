<div class="min-h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1519315901367-f34ff9154fa6?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center relative py-12">
  <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
  <div class="relative z-10 w-full max-w-lg px-4">
    <div class="glass-dark border border-slate-700/50 rounded-3xl p-8 shadow-2xl">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 bg-gradient-to-br from-pool to-pool-dark rounded-2xl flex items-center justify-center shadow-lg shadow-pool/20 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight text-center">Rejoindre SwimClubOS</h1>
        <p class="text-slate-400 text-sm mt-3 text-center">Creez votre compte Coach ou Nageur.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <div *ngIf="successMsg" class="p-4 rounded-xl border-2 border-emerald-500 bg-emerald-900/20 text-emerald-400 text-sm font-bold text-center">
          {{ successMsg }}
        </div>

        <div *ngIf="errorMsg" class="p-4 rounded-xl border-2 border-rose-500 bg-rose-900/20 text-rose-400 text-sm font-bold text-center">
          {{ errorMsg }}
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-1.5 ml-1">Prenom</label>
            <input formControlName="firstName" type="text" placeholder="Jean" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-pool text-white placeholder-slate-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-1.5 ml-1">Nom</label>
            <input formControlName="lastName" type="text" placeholder="Dupont" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-pool text-white placeholder-slate-500">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-1.5 ml-1">Email</label>
          <input formControlName="email" type="email" placeholder="name@example.com" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-pool text-white placeholder-slate-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-2 ml-1">Role dans le club</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="cursor-pointer">
              <input type="radio" formControlName="role" value="COACH" class="sr-only peer">
              <div class="flex flex-col items-center p-4 rounded-xl border-2 border-slate-600 bg-slate-800/40 peer-checked:border-blue-500 peer-checked:bg-blue-900/30 transition-all">
                <span class="text-sm font-bold text-white">Coach</span>
                <span class="text-xs text-slate-400 mt-1 text-center">Gerer sessions et nageurs</span>
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" formControlName="role" value="SWIMMER" class="sr-only peer">
              <div class="flex flex-col items-center p-4 rounded-xl border-2 border-slate-600 bg-slate-800/40 peer-checked:border-emerald-500 peer-checked:bg-emerald-900/30 transition-all">
                <span class="text-sm font-bold text-white">Nageur</span>
                <span class="text-xs text-slate-400 mt-1 text-center">Voir mes sessions</span>
              </div>
            </label>
          </div>
          <p class="text-xs text-slate-500 mt-2 ml-1">Le compte Admin ne peut pas etre cree via inscription.</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-1.5 ml-1">Mot de passe</label>
            <input formControlName="password" type="password" placeholder="Min. 6 caracteres" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-pool text-white placeholder-slate-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-1.5 ml-1">Confirmer</label>
            <input formControlName="confirmPassword" type="password" placeholder="..." class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-pool text-white placeholder-slate-500" [class.border-red-500]="form.hasError('passwordsMismatch') && form.get('confirmPassword')?.dirty">
          </div>
        </div>
        <p *ngIf="form.hasError('passwordsMismatch') && form.get('confirmPassword')?.dirty" class="text-xs text-red-400">Les mots de passe ne correspondent pas.</p>
        <button type="submit" [disabled]="form.invalid || loading" class="w-full bg-gradient-to-r from-pool to-pool-dark disabled:opacity-50 text-white py-3 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center mt-2">
          <svg *ngIf="loading" class="animate-spin w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
          {{ loading ? 'Creation...' : 'Creer mon compte' }}
        </button>
      </form>
      <div class="mt-6 text-center border-t border-slate-700/50 pt-6">
        <p class="text-slate-400 text-sm">Deja un compte ? <a routerLink="/login" class="font-bold text-white hover:text-pool transition-colors">Se connecter</a></p>
      </div>
    </div>
  </div>
</div>
