<div class="h-[calc(100vh-8rem)] glass rounded-xl overflow-hidden shadow-sm flex flex-col relative">

  <!-- Overlay legend panel -->
  <div class="absolute top-4 left-4 z-[400] bg-white/95 backdrop-blur-sm p-4 rounded-xl shadow-lg w-64 border border-border">
    <h3 class="font-bold text-foreground text-sm mb-1">Swimming Pools — Tunisia</h3>
    <p class="text-xs text-muted-foreground mb-4">All registered aquatic centers managed by FTN.</p>

    <div class="space-y-2">
      @for (pool of pools; track pool.name) {
        <div class="flex items-center justify-between py-1.5 border-b border-border last:border-0">
          <div class="flex items-center gap-2 min-w-0">
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0"
              [style.background]="pool.status === 'operational' ? '#10b981' : pool.status === 'maintenance' ? '#f59e0b' : '#ef4444'">
            </span>
            <span class="text-xs text-foreground font-medium truncate">{{ pool.name.replace("Piscine ", "").replace("d'", "") }}</span>
          </div>
          <span class="text-[10px] text-muted-foreground ml-1 flex-shrink-0">{{ pool.city.split(',')[0] }}</span>
        </div>
      }
    </div>

    <!-- Status legend -->
    <div class="mt-4 pt-3 border-t border-border flex gap-3">
      <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-500"></span><span class="text-[10px] text-muted-foreground">Open</span></div>
      <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-amber-500"></span><span class="text-[10px] text-muted-foreground">Maintenance</span></div>
      <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-red-500"></span><span class="text-[10px] text-muted-foreground">Closed</span></div>
    </div>
  </div>

  <div #mapContainer class="w-full h-full z-0"></div>
</div>
