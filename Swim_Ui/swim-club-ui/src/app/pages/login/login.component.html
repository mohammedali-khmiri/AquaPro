<div class="min-h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1519315901367-f34ff9154fa6?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center relative">
  <div class="absolute inset-0 bg-gradient-to-br from-slate-900/80 via-slate-900/60 to-pool-dark/40 backdrop-blur-sm"></div>

  <!-- Bouton dark mode flottant -->
  <button (click)="layoutSvc.toggleDarkMode()"
    class="absolute top-4 right-4 z-20 flex items-center gap-2 px-3 py-2 rounded-xl bg-sky-500 hover:bg-sky-600 text-white text-sm font-semibold shadow-lg transition-all">
    <span>{{ layoutSvc.isDark ? '☀️ Clair' : '🌙 Sombre' }}</span>
  </button>

  <div class="relative z-10 w-full max-w-md px-4">
    <div class="bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl backdrop-blur-xl">

      <!-- Logo + Titre -->
      <div class="flex flex-col items-center mb-8">
        <div class="flex items-center space-x-3 mb-5">
          <img src="assets/logo-aquapro.png" alt="AquaPro Logo" class="h-16 w-auto object-contain drop-shadow-lg" />
          <div class="leading-tight">
            <p class="font-extrabold text-2xl text-white tracking-tight">AQUA<span class="text-pool"> PRO</span></p>
            <p class="text-xs text-slate-400 font-medium tracking-widest uppercase">Swim Club</p>
          </div>
        </div>
        <div class="w-full h-px bg-gradient-to-r from-transparent via-pool/50 to-transparent"></div>
        <p class="text-slate-300 text-sm mt-4 font-medium">Connectez-vous à votre espace</p>
      </div>

      <!-- Comptes de test -->
      <div class="mb-6 p-3 rounded-xl bg-white/5 border border-white/10">
        <p class="text-xs text-slate-400 font-semibold mb-2 uppercase tracking-wider">Comptes de test :</p>
        <div class="flex flex-wrap gap-2">
          <button type="button" (click)="form.patchValue({email:'admin@example.com',password:'password123'})" class="text-xs px-2.5 py-1.5 rounded-lg bg-red-900/40 text-red-300 border border-red-700/40 hover:bg-red-800/60 transition-colors font-semibold min-w-[80px] text-center">Admin</button>
          <button type="button" (click)="form.patchValue({email:'coach@example.com',password:'password123'})" class="text-xs px-2.5 py-1.5 rounded-lg bg-blue-900/40 text-blue-300 border border-blue-700/40 hover:bg-blue-800/60 transition-colors font-semibold min-w-[80px] text-center">Coach</button>
          <button type="button" (click)="form.patchValue({email:'swimmer@example.com',password:'password123'})" class="text-xs px-2.5 py-1.5 rounded-lg bg-emerald-900/40 text-emerald-300 border border-emerald-700/40 hover:bg-emerald-800/60 transition-colors font-semibold min-w-[80px] text-center">Swimmer</button>
        </div>
      </div>

      <!-- Erreur -->
      <div *ngIf="errorMsg" class="mb-4 px-4 py-3 rounded-xl bg-red-900/40 border border-red-700/40 text-red-300 text-sm flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12A9 9 0 113 12a9 9 0 0118 0z"/></svg>
        {{ errorMsg }}
      </div>
      <!-- Success -->
      <div *ngIf="successMsg" class="alert alert-success mt-3 text-center">
        {{ successMsg }}
      </div>

      <!-- Formulaire -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-2">Email</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
            </span>
            <input formControlName="email" type="email" placeholder="nom@exemple.com"
              class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-pool focus:border-transparent transition-all text-white placeholder-slate-400 text-sm">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-300 uppercase tracking-widest mb-2">Mot de passe</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </span>
            <input formControlName="password" type="password" placeholder="••••••••"
              class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-pool focus:border-transparent transition-all text-white placeholder-slate-400 text-sm">
          </div>
        </div>

        <button type="submit" [disabled]="form.invalid || loading"
          class="w-full bg-gradient-to-r from-pool to-pool-dark hover:from-pool-dark hover:to-pool disabled:opacity-40 disabled:cursor-not-allowed text-white py-3.5 rounded-xl font-bold shadow-lg shadow-pool/30 transition-all duration-200 flex items-center justify-center gap-2 text-sm mt-2">
          <svg *ngIf="!loading" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-6 space-y-3 border-t border-white/10 pt-6">
        <button (click)="continueAsVisitor()"
          class="w-full py-2.5 rounded-xl border border-white/20 text-slate-300 text-sm font-semibold hover:bg-white/10 hover:text-white transition-all flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          Continuer comme visiteur
        </button>
        <p class="text-slate-400 text-sm text-center">Pas de compte ? <a routerLink="/register" class="font-bold text-white hover:text-pool transition-colors">Créer un compte</a></p>
      </div>

    </div>
  </div>
</div>
