<div class="grid grid-cols-1 md:grid-cols-3 gap-4 h-[calc(100vh-120px)] p-4 bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-white transition-colors duration-300">

  <div *ngIf="authService.isLoggedIn()" class="md:col-span-1 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl p-4 flex flex-col space-y-4 overflow-y-auto transition-colors">
    <div class="border-b border-slate-200 dark:border-white/10 pb-2">
      <h3 class="font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2">
        💬 Discussions Club
      </h3>
      <p class="text-[10px] text-slate-400 dark:text-slate-500">Échangez avec les entraîneurs et nageurs</p>
    </div>

    <div class="space-y-2">
      <div *ngFor="let member of membersList" class="flex items-center gap-3 p-2.5 hover:bg-slate-100 dark:hover:bg-white/5 rounded-xl cursor-pointer transition">
        <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center font-bold text-xs text-pool dark:text-cyan-400">
          {{ member.firstName?.charAt(0) }}
        </div>
        <div class="text-xs">
          <p class="font-semibold text-slate-700 dark:text-slate-200">{{ member.firstName }} {{ member.lastName }}</p>
          <p class="text-[10px] text-slate-400 dark:text-slate-500">En ligne</p>
        </div>
      </div>
    </div>
  </div>

  <div [ngClass]="authService.isLoggedIn() ? 'md:col-span-2' : 'md:col-span-3'"
       class="bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl flex flex-col justify-between overflow-hidden shadow-xl transition-all">

    <div class="bg-slate-100/60 dark:bg-white/5 border-b border-slate-200 dark:border-white/10 p-4 flex items-center justify-between transition-colors">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-xl shadow-md shadow-cyan-500/10">
          🤖
        </div>
        <div>
          <h3 class="font-bold text-sm text-slate-800 dark:text-cyan-400 flex items-center gap-2">
            Assistant AquaPro
          </h3>
          <span class="text-[10px] text-emerald-600 dark:text-emerald-400 font-medium flex items-center gap-1">
            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Modèle  Actif
          </span>
        </div>
      </div>

      <span *ngIf="!authService.isLoggedIn()" class="text-[10px] bg-cyan-500/10 dark:bg-cyan-500/20 text-cyan-600 dark:text-cyan-300 font-semibold px-2 py-1 rounded-md border border-cyan-500/20 dark:border-cyan-500/30">
        Mode Visiteur (Public)
      </span>
    </div>

    <div #chatContainer class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-100/40 dark:bg-slate-900/40 transition-colors">
      <div *ngFor="let msg of messages"
           [ngClass]="msg.role === 'user' ? 'justify-end' : 'justify-start'" class="flex">

        <div [ngClass]="msg.role === 'user' ? 'bg-cyan-600 text-white rounded-br-none' : 'bg-slate-200 text-slate-800 dark:bg-white/10 dark:text-slate-200 rounded-bl-none'"
             class="max-w-[75%] p-3 rounded-2xl text-xs shadow-sm border border-slate-300/40 dark:border-white/5 whitespace-pre-line transition-all">
          {{ msg.content }}
        </div>
      </div>
    </div>

    <div class="p-4 border-t border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-slate-900/60 transition-colors">
      <div class="flex gap-2">
        <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
               placeholder="Posez votre question sur les clubs, temps ou règlements de la FTN..."
               class="flex-1 bg-white dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-xl px-4 py-2.5 text-xs text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all">

        <button (click)="sendMessage()"
                class="px-4 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 font-semibold rounded-xl text-xs text-white transition active:scale-95 flex items-center gap-1 shadow-md shadow-cyan-500/10">
          <span>Envoyer</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9-2-9-12-9 12 9 2zm0 0v-8" />
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>
