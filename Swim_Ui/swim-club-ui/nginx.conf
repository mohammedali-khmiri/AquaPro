server {
    listen 80;
    server_name localhost;

    # 1. Servir l'application Angular (Single Page Application)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 🌟 2. LE REVERSE PROXY : Rediriger toutes les requêtes /api vers l'API Gateway
    # Dans le réseau Docker, la gateway est accessible via son nom de conteneur sur le port 8080
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🌟 3. Gestion des WebSockets pour le chat si nécessaire
    location /ws-chat/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
